name: Pull Requests

on:
  pull_request:
    branches:
      - master

jobs:
  style:
    name: Style Check
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "black>=24.0.0" "isort>=5.13.0"
      - name: Check code styling with Black
        run: |
          black --diff aydin
          black --check aydin
      - name: Check import sorting with isort
        run: |
          isort --check-only aydin/

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flake8>=7.0.0"
      - name: Check code with Flake8
        run: |
          flake8 --ignore=E501,E203,E741,W503,E402,F401,E721,E275,E731,E226,F821 aydin

  test-linux39:
    needs: [style, lint]
    name: Tests (Python 3.9)
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the tests with coverage
        run: |
          pytest aydin/ --cov=aydin --cov-report=xml --cov-fail-under=40 --disable-pytest-warnings --durations=30
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-linux310:
    needs: [style, lint]
    name: Tests (Python 3.10)
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the tests
        run: |
          pytest aydin/ --disable-pytest-warnings --durations=30

  test-linux311:

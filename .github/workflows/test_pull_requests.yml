name: Pull Requests

on:
  pull_request:
    branches:
      - main

jobs:
  style:
    name: Style Check
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "black>=24.0.0" "isort>=5.13.0"
      - name: Check code styling with Black
        run: |
          black --diff src/aydin
          black --check src/aydin
      - name: Check import sorting with isort
        run: |
          isort --check-only src/aydin/

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flake8>=7.0.0"
      - name: Check code with Flake8
        run: |
          flake8 src/aydin/

  test-linux:
    needs: [style, lint]
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the tests
        run: |
          pytest src/aydin/ ${{ matrix.python-version == '3.9' && '--cov=src/aydin --cov-report=xml --cov-fail-under=40' || '' }} --disable-pytest-warnings --durations=30
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.9'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-macos-arm:
    needs: [style, lint]
    name: Tests macOS ARM (Python 3.11)
    runs-on: macos-14
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install system dependencies
        run: |
          brew install libomp
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the tests
        run: |
          pytest src/aydin/ --disable-pytest-warnings --durations=30

  test-windows:
    needs: [style, lint]
    name: Tests Windows (Python 3.11)
    runs-on: windows-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the tests
        run: |
          pytest src/aydin/ --disable-pytest-warnings --durations=30

  test-unstable-linux39:
    needs: [test-linux]
    name: Tests Unstable (Python 3.9)
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the tests
        run: |
          pytest src/aydin/ --rununstable --disable-pytest-warnings --durations=30

  test-heavy-linux39:
    needs: [test-linux]
    name: Tests Heavy (Python 3.9)
    runs-on: ubuntu-latest
    if: github.repository == 'royerlab/aydin'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the tests
        run: |
          pytest src/aydin/ --runheavy --disable-pytest-warnings --durations=30

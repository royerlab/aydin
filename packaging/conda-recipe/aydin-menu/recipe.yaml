context:
  name: aydin-menu

package:
  name: ${{ name }}
  version: ${{ env.get("AYDIN_VERSION", "0.0.0") }}

source:
  path: ../../../

build:
  noarch: generic
  number: 0

outputs:
  - package:
      name: aydin-menu
    build:
      noarch: generic
    files:
      - Menu/*
    script:
      content:
        - mkdir -p "${PREFIX}/Menu"
        - cp packaging/menuinst/aydin-studio.json "${PREFIX}/Menu/aydin-studio.json"
        - cp packaging/icons/aydin_icon.png "${PREFIX}/Menu/aydin_icon.png"
        - cp packaging/icons/aydin_icon.ico "${PREFIX}/Menu/aydin_icon.ico"
        - cp packaging/icons/aydin_icon.icns "${PREFIX}/Menu/aydin_icon.icns"
    requirements:
      run:
        - aydin

tests:
  - files:
      - Menu/aydin-studio.json

about:
  homepage: https://royerlab.github.io/aydin/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Desktop menu shortcut for Aydin Studio

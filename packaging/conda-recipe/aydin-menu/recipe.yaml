context:
  name: aydin-menu
  version: ${{ env.get("AYDIN_VERSION", default="0.0.0") }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  path: ../../../

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p "${PREFIX}/Menu"                                                    # [unix]
    - cp packaging/menuinst/aydin-studio.json "${PREFIX}/Menu/aydin-studio.json"   # [unix]
    - cp packaging/icons/aydin_icon.png "${PREFIX}/Menu/aydin_icon.png"            # [unix]
    - cp packaging/icons/aydin_icon.ico "${PREFIX}/Menu/aydin_icon.ico"            # [unix]
    - cp packaging/icons/aydin_icon.icns "${PREFIX}/Menu/aydin_icon.icns"          # [unix]
    - if not exist "%PREFIX%\Menu" mkdir "%PREFIX%\Menu"                           # [win]
    - copy packaging\menuinst\aydin-studio.json "%PREFIX%\Menu\aydin-studio.json"  # [win]
    - copy packaging\icons\aydin_icon.png "%PREFIX%\Menu\aydin_icon.png"           # [win]
    - copy packaging\icons\aydin_icon.ico "%PREFIX%\Menu\aydin_icon.ico"           # [win]
    - copy packaging\icons\aydin_icon.icns "%PREFIX%\Menu\aydin_icon.icns"         # [win]

requirements:
  run:
    - aydin

tests:
  - files:
      source:
        - packaging/menuinst/aydin-studio.json

about:
  homepage: https://royerlab.github.io/aydin/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Desktop menu shortcut for Aydin Studio
